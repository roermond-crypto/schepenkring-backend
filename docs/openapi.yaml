components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation, location_id]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        password:
          type: string
        password_confirmation:
          type: string
        location_id:
          type: integer
        website:
          type: string
          description: Honeypot field, must be empty.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        device_name:
          type: string

    AdminUserStoreRequest:
      type: object
      required: [type, name, email, password]
      properties:
        type:
          type: string
          enum: [EMPLOYEE, CLIENT]
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        password:
          type: string
        status:
          type: string
          enum: [ACTIVE, DISABLED, BLOCKED]
        location_id:
          type: integer
          description: Required when creating a CLIENT.

    AdminUserUpdateRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        status:
          type: string
          enum: [ACTIVE, DISABLED, BLOCKED]

    AdminUserLocationUpdateRequest:
      type: object
      properties:
        location_id:
          type: integer
        locations:
          type: array
          items:
            type: object
            properties:
              location_id:
                type: integer
              role:
                type: string
                enum: [LOCATION_MANAGER, LOCATION_EMPLOYEE]

    MeProfileRequest:
      type: object
      properties:
        name:
          type: string
        timezone:
          type: string
        locale:
          type: string
        notifications_enabled:
          type: boolean
        email_notifications_enabled:
          type: boolean

    MePersonalRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        date_of_birth:
          type: string
          format: date
        email:
          type: string

    MeAddressRequest:
      type: object
      properties:
        address_line1:
          type: string
        address_line2:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        country:
          type: string

    MeSecurityRequest:
      type: object
      required: [two_factor_enabled]
      properties:
        two_factor_enabled:
          type: boolean
        otp_secret:
          type: string
        otp_code:
          type: string
        password:
          type: string

    MePasswordRequest:
      type: object
      required: [current_password, password, password_confirmation]
      properties:
        current_password:
          type: string
        password:
          type: string
        password_confirmation:
          type: string

    ImpersonationStartRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
        otp_code:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [ADMIN, EMPLOYEE, CLIENT]
        status:
          type: string
          enum: [ACTIVE, DISABLED, BLOCKED]
        name:
          type: string
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        date_of_birth:
          type: string
          format: date
          nullable: true
        email:
          type: string
        phone:
          type: string
          nullable: true
        client_location_id:
          type: integer
          nullable: true
        client_location:
          $ref: '#/components/schemas/Location'
        locations:
          type: array
          items:
            $ref: '#/components/schemas/LocationRole'
        timezone:
          type: string
          nullable: true
        locale:
          type: string
          nullable: true
        address_line1:
          type: string
          nullable: true
        address_line2:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        postal_code:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        two_factor_enabled:
          type: boolean
        two_factor_confirmed_at:
          type: string
          format: date-time
          nullable: true
        email_changed_at:
          type: string
          format: date-time
          nullable: true
        phone_changed_at:
          type: string
          format: date-time
          nullable: true
        password_changed_at:
          type: string
          format: date-time
          nullable: true
        last_login_at:
          type: string
          format: date-time
        notifications_enabled:
          type: boolean
        email_notifications_enabled:
          type: boolean
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Location:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string

    LocationRole:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        role:
          type: string
          enum: [LOCATION_MANAGER, LOCATION_EMPLOYEE]

    AuthResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
        token:
          type: string

    UserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'

    MeResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
        impersonation:
          type: object
          nullable: true
          properties:
            session_id:
              type: integer
            impersonator:
              $ref: '#/components/schemas/User'

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        links:
          type: object
        meta:
          type: object

    AuditUser:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        status:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        created_at:
          type: string
          format: date-time
        actor_id:
          type: integer
          nullable: true
        impersonator_id:
          type: integer
          nullable: true
        actor:
          $ref: '#/components/schemas/AuditUser'
        impersonator:
          $ref: '#/components/schemas/AuditUser'
          nullable: true
        location_id:
          type: integer
          nullable: true
        location:
          $ref: '#/components/schemas/Location'
        action:
          type: string
        entity_type:
          type: string
          nullable: true
        entity_id:
          type: integer
          nullable: true
        risk_level:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        result:
          type: string
          enum: [SUCCESS, FAIL]
        ip_address:
          type: string
          nullable: true
        ip_hash:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        device_id:
          type: string
          nullable: true
        request_id:
          type: string
          nullable: true
        idempotency_key:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        snapshot_before:
          type: object
          nullable: true
        snapshot_after:
          type: object
          nullable: true
        updated_at:
          type: string
          format: date-time

    AuditLogResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AuditLog'

    AuditLogListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        links:
          type: object
        meta:
          type: object

    Notification:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        message:
          type: string
        data:
          type: object
