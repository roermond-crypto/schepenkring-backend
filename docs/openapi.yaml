openapi: 3.0.3
info:
  title: NauticSecure API
  version: "1.0.0"
  description: |
    API for NauticSecure user management, location scoping, and impersonation.
servers:
  - url: http://localhost:8000

security:
  - bearerAuth: []

paths:
  /api/auth/register:
    post:
      summary: Client self-registration
      description: Only CLIENT users can self-register. Employees/partners/admins are blocked.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: "Jane Client"
              email: "jane.client@example.com"
              phone: "+1-555-0100"
              password: "Password123!"
              password_confirmation: "Password123!"
              location_id: 1
              website: ""
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                data:
                  id: 100
                  type: CLIENT
                  status: ACTIVE
                  name: "Jane Client"
                  first_name: null
                  last_name: null
                  email: "jane.client@example.com"
                  phone: "+1-555-0100"
                  client_location_id: 1
                  client_location:
                    id: 1
                    name: "Headquarters"
                    code: "HQ"
                  locations: []
                  timezone: null
                  locale: null
                  address_line1: null
                  address_line2: null
                  city: null
                  state: null
                  postal_code: null
                  country: null
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T10:00:00Z"
                  phone_changed_at: "2026-03-05T10:00:00Z"
                  password_changed_at: "2026-03-05T10:00:00Z"
                  created_at: "2026-03-05T10:00:00Z"
                  updated_at: "2026-03-05T10:00:00Z"
                token: "1|client_token_example"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/auth/login:
    post:
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "admin@example.com"
              password: "password"
              device_name: "postman"
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                data:
                  id: 1
                  type: ADMIN
                  status: ACTIVE
                  name: "Admin User"
                  first_name: null
                  last_name: null
                  email: "admin@example.com"
                  phone: null
                  client_location_id: null
                  client_location: null
                  locations: []
                  timezone: null
                  locale: null
                  address_line1: null
                  address_line2: null
                  city: null
                  state: null
                  postal_code: null
                  country: null
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T09:00:00Z"
                  phone_changed_at: null
                  password_changed_at: "2026-03-05T09:00:00Z"
                  created_at: "2026-03-05T09:00:00Z"
                  updated_at: "2026-03-05T09:00:00Z"
                token: "1|admin_token_example"
        '422':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/auth/logout:
    post:
      summary: Logout
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Logged out."

  /api/me:
    get:
      summary: Get current user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
              example:
                data:
                  id: 100
                  type: CLIENT
                  status: ACTIVE
                  name: "Jane Client"
                  first_name: "Jane"
                  last_name: "Client"
                  email: "jane.client@example.com"
                  phone: "+1-555-0100"
                  client_location_id: 1
                  client_location:
                    id: 1
                    name: "Headquarters"
                    code: "HQ"
                  locations: []
                  timezone: "UTC"
                  locale: "en"
                  address_line1: "1 Marina Way"
                  address_line2: null
                  city: "Lagos"
                  state: "LA"
                  postal_code: "100001"
                  country: "NG"
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T10:00:00Z"
                  phone_changed_at: "2026-03-05T10:00:00Z"
                  password_changed_at: "2026-03-05T10:00:00Z"
                  created_at: "2026-03-05T10:00:00Z"
                  updated_at: "2026-03-05T10:00:00Z"
                impersonation: null

  /api/me/profile:
    patch:
      summary: Update profile tab
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeProfileRequest'
            example:
              name: "Jane Client"
              timezone: "Africa/Lagos"
              locale: "en"
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/personal:
    patch:
      summary: Update personal tab
      description: Idempotency-Key is required when changing email or phone.
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MePersonalRequest'
            example:
              first_name: "Jane"
              last_name: "Client"
              phone: "+1-555-0100"
              date_of_birth: "1992-06-15"
              email: "jane.client@example.com"
      responses:
        '200':
          description: Updated personal info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/address:
    patch:
      summary: Update address tab
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeAddressRequest'
            example:
              address_line1: "1 Marina Way"
              city: "Lagos"
              state: "LA"
              postal_code: "100001"
              country: "NG"
      responses:
        '200':
          description: Updated address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/security:
    patch:
      summary: Update security tab
      description: Idempotency-Key is required.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeSecurityRequest'
            example:
              two_factor_enabled: true
              otp_secret: "JBSWY3DPEHPK3PXP"
              otp_code: "123456"
      responses:
        '200':
          description: Updated security
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/password:
    patch:
      summary: Update password tab
      description: Idempotency-Key is required.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MePasswordRequest'
            example:
              current_password: "Password123!"
              password: "NewPassword123!"
              password_confirmation: "NewPassword123!"
      responses:
        '200':
          description: Updated password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/notifications:
    get:
      summary: List notifications
      parameters:
        - in: query
          name: read
          schema:
            type: boolean
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
              example:
                data:
                  - id: 10
                    user_id: 1
                    notification_id: 55
                    read: false
                    read_at: null
                    created_at: "2026-03-05T12:40:00Z"
                    updated_at: "2026-03-05T12:40:00Z"
                    notification:
                      id: 55
                      type: "info"
                      title: "New task assigned"
                      message: "You have a new task: Inspect hull"
                      data:
                        task_id: 44
                        entity_type: "task"
                        entity_id: 44
                        url: "/dashboard/tasks/44"
                      location_id: 2
                      created_at: "2026-03-05T12:40:00Z"
                      updated_at: "2026-03-05T12:40:00Z"
                meta:
                  current_page: 1
                  last_page: 1
                  per_page: 20
                  total: 1
                  unread_count: 1

  /api/notifications/unread-count:
    get:
      summary: Get unread notifications count
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
              example:
                count: 3

  /api/notifications/{id}/read:
    post:
      summary: Mark notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Marked as read
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
                message: "Notification marked as read"

  /api/notifications/read-all:
    post:
      summary: Mark all notifications as read
      responses:
        '200':
          description: Marked all as read
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
                message: "All notifications marked as read"

  /api/analytics/track:
    post:
      summary: Track analytics event
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyticsTrackRequest'
            example:
              external_id: "123"
              name: "Boat 123"
              model: "Model X"
              price: "35000"
              ref_code: "REF-123"
              url: "https://schepenkring.example/boats/123"
              specs:
                length: "10m"
              year: "2019"
              location: "Amsterdam"
              referrer: "https://google.com"
              resolution: "1920x1080"
              language: "nl"
      responses:
        '200':
          description: Synced
          content:
            application/json:
              schema:
                type: object
              example:
                status: "synced"

  /api/analytics/summary:
    get:
      summary: Analytics summary
      security: []
      responses:
        '200':
          description: Summary rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnalyticsSummaryRow'

  /api/copilot/resolve:
    post:
      summary: Resolve copilot input
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopilotResolveRequest'
            example:
              text: "Open boat 12"
              source: "header"
              context:
                language: "nl"
      responses:
        '200':
          description: Copilot resolution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotResolveResponse'

  /api/copilot/track:
    post:
      summary: Track copilot event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopilotTrackRequest'
            example:
              event: "clicked"
              action_id: "boat.view"
              deeplink: "/admin/boats/12"
      responses:
        '200':
          description: Tracked
          content:
            application/json:
              schema:
                type: object
              example:
                message: "tracked"

  /api/copilot/audit:
    get:
      summary: List copilot audit events
      parameters:
        - in: query
          name: source
          schema:
            type: string
            enum: [header, chatpage, voice]
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: failed_only
          schema:
            type: boolean
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Paginated audit events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CopilotAuditEvent'
                  meta:
                    type: object
                  links:
                    type: object

  /api/copilot/voice-settings:
    get:
      summary: Get copilot voice settings
      responses:
        '200':
          description: Voice settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotVoiceSettings'
    put:
      summary: Update copilot voice settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopilotVoiceSettings'
            example:
              tts_enabled: true
              tts_voice_id: "en-US-Neural2-A"
              stt_language: "nl"
              speaking_rate: 1.0
              pitch: 0.0
      responses:
        '200':
          description: Updated voice settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotVoiceSettings'

  /api/contracts/generate:
    post:
      summary: Generate contract PDF
      description: Creates a draft signing request and stores the generated contract PDF. If `send_to_signhost` and recipients are supplied, it also creates the Signhost transaction and returns the signer deeplink.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignhostGenerateContractRequest'
            example:
              entity_type: "Deal"
              entity_id: 123
              location_id: 2
              title: "Purchase Agreement"
              send_to_signhost: true
              recipients:
                - email: "buyer@example.com"
                  name: "Buyer User"
                  role: "buyer"
              reference: "deal-123"
              metadata:
                template_id: "deal-standard"
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SignhostGenerateContractRequest'
      responses:
        '200':
          description: Contract generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  contract_pdf_path:
                    type: string
                    nullable: true
                  contract_sha256:
                    type: string
                    nullable: true
                  sign_url:
                    type: string
                    nullable: true
                  sign_request:
                    $ref: '#/components/schemas/SignRequest'
              example:
                message: "Contract generated and Signhost request created"
                contract_pdf_path: "contracts/deal_123_20260305_120000.pdf"
                contract_sha256: "f1c2d3e4f5"
                sign_url: "https://signhost.app/sign/abc"
                sign_request:
                  id: 77
                  location_id: 2
                  entity_type: "Deal"
                  entity_id: 123
                  provider: "signhost"
                  status: "SENT"
                  signhost_transaction_id: "sh_123456"
                  sign_url: "https://signhost.app/sign/abc"
                  requested_by_user_id: 5
                  metadata:
                    contract_pdf_path: "contracts/deal_123_20260305_120000.pdf"
                    contract_sha256: "f1c2d3e4f5"
                    reference: "deal-123"
                    sign_urls:
                      - role: "buyer"
                        url: "https://signhost.app/sign/abc"
                  documents:
                    - id: 900
                      sign_request_id: 77
                      file_path: "contracts/deal_123_20260305_120000.pdf"
                      sha256: "f1c2d3e4f5"
                      type: "original"
                      created_at: "2026-03-05T12:00:00Z"
                      updated_at: "2026-03-05T12:00:00Z"
                  created_at: "2026-03-05T12:00:00Z"
                  updated_at: "2026-03-05T12:00:00Z"

  /api/signhost/request:
    post:
      summary: Create Signhost request
      description: Requires fresh auth (password + optional OTP) and Idempotency-Key.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignhostRequestCreateRequest'
            example:
              sign_request_id: 77
              recipients:
                - user_id: 25
                  role: "buyer"
                - email: "seller@example.com"
                  name: "Seller User"
                  role: "seller"
              reference: "deal-123"
              password: "Password123!"
              otp_code: "123456"
      responses:
        '201':
          description: Signhost request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  sign_request:
                    $ref: '#/components/schemas/SignRequest'
              example:
                message: "Signhost request created"
                sign_request:
                  id: 77
                  location_id: 2
                  entity_type: "Deal"
                  entity_id: 123
                  provider: "signhost"
                  status: "SENT"
                  signhost_transaction_id: "sh_123456"
                  sign_url: "https://signhost.app/sign/abc"
                  requested_by_user_id: 5
                  metadata:
                    reference: "deal-123"
                    recipients:
                      - user_id: 25
                        role: "buyer"
                      - email: "seller@example.com"
                        name: "Seller User"
                        role: "seller"
                    sign_urls:
                      - role: "buyer"
                        url: "https://signhost.app/sign/buyer"
                      - role: "seller"
                        url: "https://signhost.app/sign/seller"
                  documents: []
                  created_at: "2026-03-05T12:10:00Z"
                  updated_at: "2026-03-05T12:10:00Z"

  /api/signhost/resend:
    post:
      summary: Resend Signhost request
      description: Requires fresh auth (password + optional OTP) and Idempotency-Key.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignhostRequestActionRequest'
            example:
              sign_request_id: 77
              password: "Password123!"
              otp_code: "123456"
      responses:
        '200':
          description: Signhost request resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  sign_request:
                    $ref: '#/components/schemas/SignRequest'
              example:
                message: "Signhost request resent"
                sign_request:
                  id: 77
                  status: "SENT"

  /api/signhost/cancel:
    post:
      summary: Cancel Signhost request
      description: Requires fresh auth (password + optional OTP) and Idempotency-Key.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignhostRequestActionRequest'
            example:
              sign_request_id: 77
              password: "Password123!"
              otp_code: "123456"
              reason: "Customer requested cancellation"
      responses:
        '200':
          description: Signhost request cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  sign_request:
                    $ref: '#/components/schemas/SignRequest'
              example:
                message: "Signhost request cancelled"
                sign_request:
                  id: 77
                  status: "FAILED"

  /api/signhost/status:
    get:
      summary: Get Signhost request status
      parameters:
        - in: query
          name: sign_request_id
          schema:
            type: integer
        - in: query
          name: entity_type
          schema:
            type: string
        - in: query
          name: entity_id
          schema:
            type: integer
      responses:
        '200':
          description: Signhost request status
          content:
            application/json:
              schema:
                type: object
                properties:
                  sign_request:
                    $ref: '#/components/schemas/SignRequest'
              example:
                sign_request:
                  id: 77
                  status: "SIGNED"

  /api/signhost/documents:
    get:
      summary: List Signhost documents
      parameters:
        - in: query
          name: sign_request_id
          schema:
            type: integer
        - in: query
          name: entity_type
          schema:
            type: string
        - in: query
          name: entity_id
          schema:
            type: integer
      responses:
        '200':
          description: Signhost documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      $ref: '#/components/schemas/SignDocument'
              example:
                documents:
                  - id: 901
                    sign_request_id: 77
                    file_path: "contracts/deal_123_signed_20260305_121500.pdf"
                    sha256: "a1b2c3d4"
                    type: "signed"
                    created_at: "2026-03-05T12:15:00Z"
                    updated_at: "2026-03-05T12:15:00Z"

  /api/deals/{dealId}/contract/generate:
    post:
      summary: Generate deal contract PDF (compat)
      description: Generates the PDF contract for a deal. If `send_to_signhost` and recipients are supplied, it also creates the Signhost transaction and returns the signer deeplink data.
      parameters:
        - in: path
          name: dealId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [location_id]
              properties:
                location_id:
                  type: integer
                title:
                  type: string
                send_to_signhost:
                  type: boolean
                recipients:
                  type: array
                  items:
                    type: object
                    properties:
                      email:
                        type: string
                        nullable: true
                      name:
                        type: string
                        nullable: true
                      user_id:
                        type: integer
                        nullable: true
                      role:
                        type: string
                        nullable: true
                reference:
                  type: string
                  nullable: true
                metadata:
                  type: object
            example:
              location_id: 2
              title: "Purchase Agreement"
              send_to_signhost: true
              recipients:
                - email: "buyer@example.com"
                  name: "Buyer User"
                  role: "buyer"
              reference: "deal-123"
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SignhostGenerateContractRequest'
      responses:
        '200':
          description: Contract generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  contract_pdf_path:
                    type: string
                    nullable: true
                  contract_sha256:
                    type: string
                    nullable: true
                  sign_url:
                    type: string
                    nullable: true
                  sign_request:
                    $ref: '#/components/schemas/SignRequest'
                  transaction:
                    type: object
              example:
                message: "Contract generated and Signhost request created"
                contract_pdf_path: "contracts/deal_123_20260305_120000.pdf"
                contract_sha256: "f1c2d3e4f5"
                sign_url: "https://signhost.app/sign/buyer"
                sign_request:
                  id: 77
                  location_id: 2
                  entity_type: "Deal"
                  entity_id: 123
                  provider: "signhost"
                  status: "SENT"
                  signhost_transaction_id: "sh_123456"
                  sign_url: "https://signhost.app/sign/buyer"
                transaction:
                  id: 77
                  deal_id: 123
                  signhost_transaction_id: "sh_123456"
                  status: "signing"
