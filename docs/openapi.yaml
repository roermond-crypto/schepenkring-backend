openapi: 3.0.3
info:
  title: NauticSecure API
  version: "1.0.0"
  description: |
    API for NauticSecure user management, location scoping, and impersonation.
servers:
  - url: http://localhost:8000

security:
  - bearerAuth: []

paths:
  /api/auth/register:
    post:
      summary: Client self-registration
      description: Only CLIENT users can self-register. Employees/partners/admins are blocked.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: "Jane Client"
              email: "jane.client@example.com"
              phone: "+1-555-0100"
              password: "Password123!"
              password_confirmation: "Password123!"
              location_id: 1
              website: ""
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                data:
                  id: 100
                  type: CLIENT
                  status: ACTIVE
                  name: "Jane Client"
                  first_name: null
                  last_name: null
                  email: "jane.client@example.com"
                  phone: "+1-555-0100"
                  client_location_id: 1
                  client_location:
                    id: 1
                    name: "Headquarters"
                    code: "HQ"
                  locations: []
                  timezone: null
                  locale: null
                  address_line1: null
                  address_line2: null
                  city: null
                  state: null
                  postal_code: null
                  country: null
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T10:00:00Z"
                  phone_changed_at: "2026-03-05T10:00:00Z"
                  password_changed_at: "2026-03-05T10:00:00Z"
                  created_at: "2026-03-05T10:00:00Z"
                  updated_at: "2026-03-05T10:00:00Z"
                token: "1|client_token_example"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/auth/login:
    post:
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "admin@example.com"
              password: "password"
              device_name: "postman"
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                data:
                  id: 1
                  type: ADMIN
                  status: ACTIVE
                  name: "Admin User"
                  first_name: null
                  last_name: null
                  email: "admin@example.com"
                  phone: null
                  client_location_id: null
                  client_location: null
                  locations: []
                  timezone: null
                  locale: null
                  address_line1: null
                  address_line2: null
                  city: null
                  state: null
                  postal_code: null
                  country: null
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T09:00:00Z"
                  phone_changed_at: null
                  password_changed_at: "2026-03-05T09:00:00Z"
                  created_at: "2026-03-05T09:00:00Z"
                  updated_at: "2026-03-05T09:00:00Z"
                token: "1|admin_token_example"
        '422':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/auth/logout:
    post:
      summary: Logout
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Logged out."

  /api/me:
    get:
      summary: Get current user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
              example:
                data:
                  id: 100
                  type: CLIENT
                  status: ACTIVE
                  name: "Jane Client"
                  first_name: "Jane"
                  last_name: "Client"
                  email: "jane.client@example.com"
                  phone: "+1-555-0100"
                  client_location_id: 1
                  client_location:
                    id: 1
                    name: "Headquarters"
                    code: "HQ"
                  locations: []
                  timezone: "UTC"
                  locale: "en"
                  address_line1: "1 Marina Way"
                  address_line2: null
                  city: "Lagos"
                  state: "LA"
                  postal_code: "100001"
                  country: "NG"
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T10:00:00Z"
                  phone_changed_at: "2026-03-05T10:00:00Z"
                  password_changed_at: "2026-03-05T10:00:00Z"
                  created_at: "2026-03-05T10:00:00Z"
                  updated_at: "2026-03-05T10:00:00Z"
                impersonation: null

  /api/me/profile:
    patch:
      summary: Update profile tab
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeProfileRequest'
            example:
              name: "Jane Client"
              timezone: "Africa/Lagos"
              locale: "en"
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/personal:
    patch:
      summary: Update personal tab
      description: Idempotency-Key is required when changing email or phone.
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MePersonalRequest'
            example:
              first_name: "Jane"
              last_name: "Client"
              phone: "+1-555-0100"
              date_of_birth: "1992-06-15"
              email: "jane.client@example.com"
      responses:
        '200':
          description: Updated personal info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/address:
    patch:
      summary: Update address tab
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeAddressRequest'
            example:
              address_line1: "1 Marina Way"
              city: "Lagos"
              state: "LA"
              postal_code: "100001"
              country: "NG"
      responses:
        '200':
          description: Updated address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/security:
    patch:
      summary: Update security tab
      description: Idempotency-Key is required.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeSecurityRequest'
            example:
              two_factor_enabled: true
              otp_secret: "JBSWY3DPEHPK3PXP"
              otp_code: "123456"
      responses:
        '200':
          description: Updated security
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/password:
    patch:
      summary: Update password tab
      description: Idempotency-Key is required.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MePasswordRequest'
            example:
              current_password: "Password123!"
              password: "NewPassword123!"
              password_confirmation: "NewPassword123!"
      responses:
        '200':
          description: Updated password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/admin/users:
    get:
      summary: List users
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [ADMIN, EMPLOYEE, CLIENT]
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, DISABLED, BLOCKED]
        - in: query
          name: location_id
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Paginated users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
              example:
                data:
                  - id: 1
                    type: ADMIN
                    status: ACTIVE
                    name: "Admin User"
                    first_name: null
                    last_name: null
                    email: "admin@example.com"
                    phone: null
                    client_location_id: null
                    client_location: null
                    locations: []
                    timezone: null
                    locale: null
                    address_line1: null
                    address_line2: null
                    city: null
                    state: null
                    postal_code: null
                    country: null
                    two_factor_enabled: false
                    two_factor_confirmed_at: null
                    email_changed_at: "2026-03-05T09:00:00Z"
                    phone_changed_at: null
                    password_changed_at: "2026-03-05T09:00:00Z"
                    created_at: "2026-03-05T09:00:00Z"
                    updated_at: "2026-03-05T09:00:00Z"
                links:
                  first: "http://localhost:8000/api/admin/users?page=1"
                  last: "http://localhost:8000/api/admin/users?page=1"
                  prev: null
                  next: null
                meta:
                  current_page: 1
                  from: 1
                  last_page: 1
                  path: "http://localhost:8000/api/admin/users"
                  per_page: 15
                  to: 1
                  total: 1
    post:
      summary: Create user (employee/client)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserStoreRequest'
            example:
              type: EMPLOYEE
              name: "Marina Staff"
              email: "staff@example.com"
              phone: "+1-555-0130"
              password: "Password123!"
              status: ACTIVE
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/admin/users/{id}:
    get:
      summary: Get user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    patch:
      summary: Update user details
      description: Idempotency-Key is required when changing email/phone/status.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
            example:
              name: "Updated Staff"
              phone: "+1-555-0140"
              status: ACTIVE
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    delete:
      summary: Disable user
      description: Idempotency-Key is required.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Disabled user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/admin/users/{id}/locations:
    patch:
      summary: Assign user locations
      description: Idempotency-Key is required.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserLocationUpdateRequest'
            examples:
              employee:
                summary: Employee location assignment
                value:
                  locations:
                    - location_id: 1
                      role: LOCATION_MANAGER
                    - location_id: 2
                      role: LOCATION_EMPLOYEE
              client:
                summary: Client location assignment
                value:
                  location_id: 1
      responses:
        '200':
          description: Updated assignments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/admin/impersonate/{userId}:
    post:
      summary: Start impersonation
      description: Idempotency-Key is required. Requires fresh auth (password + OTP if enabled).
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImpersonationStartRequest'
            example:
              password: "password"
              otp_code: "123456"
      responses:
        '200':
          description: Impersonation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpersonationStartResponse'
              example:
                token: "1|impersonation_token_example"
                session:
                  id: 50
                  started_at: "2026-03-05T10:15:00Z"
                impersonated:
                  id: 100
                  type: CLIENT
                  status: ACTIVE
                  name: "Jane Client"
                  first_name: "Jane"
                  last_name: "Client"
                  email: "jane.client@example.com"
                  phone: "+1-555-0100"
                  client_location_id: 1
                  client_location:
                    id: 1
                    name: "Headquarters"
                    code: "HQ"
                  locations: []
                  timezone: null
                  locale: null
                  address_line1: null
                  address_line2: null
                  city: null
                  state: null
                  postal_code: null
                  country: null
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T10:00:00Z"
                  phone_changed_at: "2026-03-05T10:00:00Z"
                  password_changed_at: "2026-03-05T10:00:00Z"
                  created_at: "2026-03-05T10:00:00Z"
                  updated_at: "2026-03-05T10:00:00Z"

  /api/admin/impersonate/stop:
    post:
      summary: Stop impersonation
      description: Idempotency-Key is required.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Impersonation stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpersonationStopResponse'
              example:
                token: "1|admin_token_new_example"
                impersonator:
                  id: 1
                  type: ADMIN
                  status: ACTIVE
                  name: "Admin User"
                  first_name: null
                  last_name: null
                  email: "admin@example.com"
                  phone: null
                  client_location_id: null
                  client_location: null
                  locations: []
                  timezone: null
                  locale: null
                  address_line1: null
                  address_line2: null
                  city: null
                  state: null
                  postal_code: null
                  country: null
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T09:00:00Z"
                  phone_changed_at: null
                  password_changed_at: "2026-03-05T09:00:00Z"
                  created_at: "2026-03-05T09:00:00Z"
                  updated_at: "2026-03-05T09:00:00Z"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation, location_id]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        password:
          type: string
        password_confirmation:
          type: string
        location_id:
          type: integer
        website:
          type: string
          description: Honeypot field, must be empty.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        device_name:
          type: string

    AdminUserStoreRequest:
      type: object
      required: [type, name, email, password]
      properties:
        type:
          type: string
          enum: [EMPLOYEE, CLIENT]
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        password:
          type: string
        status:
          type: string
          enum: [ACTIVE, DISABLED, BLOCKED]
        location_id:
          type: integer
          description: Required when creating a CLIENT.

    AdminUserUpdateRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        status:
          type: string
          enum: [ACTIVE, DISABLED, BLOCKED]

    AdminUserLocationUpdateRequest:
      type: object
      properties:
        location_id:
          type: integer
        locations:
          type: array
          items:
            type: object
            properties:
              location_id:
                type: integer
              role:
                type: string
                enum: [LOCATION_MANAGER, LOCATION_EMPLOYEE]

    MeProfileRequest:
      type: object
      properties:
        name:
          type: string
        timezone:
          type: string
        locale:
          type: string

    MePersonalRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        date_of_birth:
          type: string
          format: date
        email:
          type: string

    MeAddressRequest:
      type: object
      properties:
        address_line1:
          type: string
        address_line2:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        country:
          type: string

    MeSecurityRequest:
      type: object
      required: [two_factor_enabled]
      properties:
        two_factor_enabled:
          type: boolean
        otp_secret:
          type: string
        otp_code:
          type: string
        password:
          type: string

    MePasswordRequest:
      type: object
      required: [current_password, password, password_confirmation]
      properties:
        current_password:
          type: string
        password:
          type: string
        password_confirmation:
          type: string

    ImpersonationStartRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
        otp_code:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [ADMIN, EMPLOYEE, CLIENT]
        status:
          type: string
          enum: [ACTIVE, DISABLED, BLOCKED]
        name:
          type: string
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        date_of_birth:
          type: string
          format: date
          nullable: true
        email:
          type: string
        phone:
          type: string
          nullable: true
        client_location_id:
          type: integer
          nullable: true
        client_location:
          $ref: '#/components/schemas/Location'
        locations:
          type: array
          items:
            $ref: '#/components/schemas/LocationRole'
        timezone:
          type: string
          nullable: true
        locale:
          type: string
          nullable: true
        address_line1:
          type: string
          nullable: true
        address_line2:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        postal_code:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        two_factor_enabled:
          type: boolean
        two_factor_confirmed_at:
          type: string
          format: date-time
          nullable: true
        email_changed_at:
          type: string
          format: date-time
          nullable: true
        phone_changed_at:
          type: string
          format: date-time
          nullable: true
        password_changed_at:
          type: string
          format: date-time
          nullable: true
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Location:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string

    LocationRole:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        role:
          type: string
          enum: [LOCATION_MANAGER, LOCATION_EMPLOYEE]

    AuthResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
        token:
          type: string

    UserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'

    MeResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
        impersonation:
          type: object
          nullable: true
          properties:
            session_id:
              type: integer
            impersonator:
              $ref: '#/components/schemas/User'

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        links:
          type: object
        meta:
          type: object

    ImpersonationStartResponse:
      type: object
      properties:
        token:
          type: string
        session:
          type: object
          properties:
            id:
              type: integer
            started_at:
              type: string
              format: date-time
        impersonated:
          $ref: '#/components/schemas/User'

    ImpersonationStopResponse:
      type: object
      properties:
        token:
          type: string
        impersonator:
          $ref: '#/components/schemas/User'

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
