openapi: 3.0.3
info:
  title: NauticSecure API
  version: "1.0.0"
  description: |
    API for NauticSecure user management, location scoping, and impersonation.
servers:
  - url: http://localhost:8000

security:
  - bearerAuth: []

paths:
  /api/auth/register:
    post:
      summary: Client self-registration
      description: Only CLIENT users can self-register. Employees/partners/admins are blocked.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: "Jane Client"
              email: "jane.client@example.com"
              phone: "+1-555-0100"
              password: "Password123!"
              password_confirmation: "Password123!"
              location_id: 1
              website: ""
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                data:
                  id: 100
                  type: CLIENT
                  status: ACTIVE
                  name: "Jane Client"
                  first_name: null
                  last_name: null
                  email: "jane.client@example.com"
                  phone: "+1-555-0100"
                  client_location_id: 1
                  client_location:
                    id: 1
                    name: "Headquarters"
                    code: "HQ"
                  locations: []
                  timezone: null
                  locale: null
                  address_line1: null
                  address_line2: null
                  city: null
                  state: null
                  postal_code: null
                  country: null
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T10:00:00Z"
                  phone_changed_at: "2026-03-05T10:00:00Z"
                  password_changed_at: "2026-03-05T10:00:00Z"
                  created_at: "2026-03-05T10:00:00Z"
                  updated_at: "2026-03-05T10:00:00Z"
                token: "1|client_token_example"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/auth/login:
    post:
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "admin@example.com"
              password: "password"
              device_name: "postman"
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                data:
                  id: 1
                  type: ADMIN
                  status: ACTIVE
                  name: "Admin User"
                  first_name: null
                  last_name: null
                  email: "admin@example.com"
                  phone: null
                  client_location_id: null
                  client_location: null
                  locations: []
                  timezone: null
                  locale: null
                  address_line1: null
                  address_line2: null
                  city: null
                  state: null
                  postal_code: null
                  country: null
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T09:00:00Z"
                  phone_changed_at: null
                  password_changed_at: "2026-03-05T09:00:00Z"
                  created_at: "2026-03-05T09:00:00Z"
                  updated_at: "2026-03-05T09:00:00Z"
                token: "1|admin_token_example"
        '422':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/auth/logout:
    post:
      summary: Logout
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: "Logged out."

  /api/me:
    get:
      summary: Get current user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
              example:
                data:
                  id: 100
                  type: CLIENT
                  status: ACTIVE
                  name: "Jane Client"
                  first_name: "Jane"
                  last_name: "Client"
                  email: "jane.client@example.com"
                  phone: "+1-555-0100"
                  client_location_id: 1
                  client_location:
                    id: 1
                    name: "Headquarters"
                    code: "HQ"
                  locations: []
                  timezone: "UTC"
                  locale: "en"
                  address_line1: "1 Marina Way"
                  address_line2: null
                  city: "Lagos"
                  state: "LA"
                  postal_code: "100001"
                  country: "NG"
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T10:00:00Z"
                  phone_changed_at: "2026-03-05T10:00:00Z"
                  password_changed_at: "2026-03-05T10:00:00Z"
                  created_at: "2026-03-05T10:00:00Z"
                  updated_at: "2026-03-05T10:00:00Z"
                impersonation: null

  /api/me/profile:
    patch:
      summary: Update profile tab
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeProfileRequest'
            example:
              name: "Jane Client"
              timezone: "Africa/Lagos"
              locale: "en"
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/personal:
    patch:
      summary: Update personal tab
      description: Idempotency-Key is required when changing email or phone.
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MePersonalRequest'
            example:
              first_name: "Jane"
              last_name: "Client"
              phone: "+1-555-0100"
              date_of_birth: "1992-06-15"
              email: "jane.client@example.com"
      responses:
        '200':
          description: Updated personal info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/address:
    patch:
      summary: Update address tab
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeAddressRequest'
            example:
              address_line1: "1 Marina Way"
              city: "Lagos"
              state: "LA"
              postal_code: "100001"
              country: "NG"
      responses:
        '200':
          description: Updated address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/security:
    patch:
      summary: Update security tab
      description: Idempotency-Key is required.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeSecurityRequest'
            example:
              two_factor_enabled: true
              otp_secret: "JBSWY3DPEHPK3PXP"
              otp_code: "123456"
      responses:
        '200':
          description: Updated security
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/me/password:
    patch:
      summary: Update password tab
      description: Idempotency-Key is required.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MePasswordRequest'
            example:
              current_password: "Password123!"
              password: "NewPassword123!"
              password_confirmation: "NewPassword123!"
      responses:
        '200':
          description: Updated password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/notifications:
    get:
      summary: List notifications
      parameters:
        - in: query
          name: read
          schema:
            type: boolean
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
              example:
                data:
                  - id: 10
                    user_id: 1
                    notification_id: 55
                    read: false
                    read_at: null
                    created_at: "2026-03-05T12:40:00Z"
                    updated_at: "2026-03-05T12:40:00Z"
                    notification:
                      id: 55
                      type: "info"
                      title: "New task assigned"
                      message: "You have a new task: Inspect hull"
                      data:
                        task_id: 44
                        entity_type: "task"
                        entity_id: 44
                        url: "/dashboard/tasks/44"
                      location_id: 2
                      created_at: "2026-03-05T12:40:00Z"
                      updated_at: "2026-03-05T12:40:00Z"
                meta:
                  current_page: 1
                  last_page: 1
                  per_page: 20
                  total: 1
                  unread_count: 1

  /api/notifications/unread-count:
    get:
      summary: Get unread notifications count
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
              example:
                count: 3

  /api/notifications/{id}/read:
    post:
      summary: Mark notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Marked as read
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
                message: "Notification marked as read"

  /api/notifications/read-all:
    post:
      summary: Mark all notifications as read
      responses:
        '200':
          description: Marked all as read
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
                message: "All notifications marked as read"
                count: 5

  /broadcasting/auth:
    post:
      summary: Broadcast channel authentication
      description: Auth endpoint for private user/location channels.
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object

  /api/admin/users:
    get:
      summary: List users
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [ADMIN, EMPLOYEE, CLIENT]
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, DISABLED, BLOCKED]
        - in: query
          name: location_id
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Paginated users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
              example:
                data:
                  - id: 1
                    type: ADMIN
                    status: ACTIVE
                    name: "Admin User"
                    first_name: null
                    last_name: null
                    email: "admin@example.com"
                    phone: null
                    client_location_id: null
                    client_location: null
                    locations: []
                    timezone: null
                    locale: null
                    address_line1: null
                    address_line2: null
                    city: null
                    state: null
                    postal_code: null
                    country: null
                    two_factor_enabled: false
                    two_factor_confirmed_at: null
                    email_changed_at: "2026-03-05T09:00:00Z"
                    phone_changed_at: null
                    password_changed_at: "2026-03-05T09:00:00Z"
                    created_at: "2026-03-05T09:00:00Z"
                    updated_at: "2026-03-05T09:00:00Z"
                links:
                  first: "http://localhost:8000/api/admin/users?page=1"
                  last: "http://localhost:8000/api/admin/users?page=1"
                  prev: null
                  next: null
                meta:
                  current_page: 1
                  from: 1
                  last_page: 1
                  path: "http://localhost:8000/api/admin/users"
                  per_page: 15
                  to: 1
                  total: 1
    post:
      summary: Create user (employee/client)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserStoreRequest'
            example:
              type: EMPLOYEE
              name: "Marina Staff"
              email: "staff@example.com"
              phone: "+1-555-0130"
              password: "Password123!"
              status: ACTIVE
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/admin/users/{id}:
    get:
      summary: Get user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    patch:
      summary: Update user details
      description: Idempotency-Key is required when changing email/phone/status.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
            example:
              name: "Updated Staff"
              phone: "+1-555-0140"
              status: ACTIVE
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    delete:
      summary: Disable user
      description: Idempotency-Key is required.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Disabled user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/admin/users/{id}/locations:
    patch:
      summary: Assign user locations
      description: Idempotency-Key is required.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserLocationUpdateRequest'
            examples:
              employee:
                summary: Employee location assignment
                value:
                  locations:
                    - location_id: 1
                      role: LOCATION_MANAGER
                    - location_id: 2
                      role: LOCATION_EMPLOYEE
              client:
                summary: Client location assignment
                value:
                  location_id: 1
      responses:
        '200':
          description: Updated assignments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/admin/impersonate/{userId}:
    post:
      summary: Start impersonation
      description: Idempotency-Key is required. Requires fresh auth (password + OTP if enabled).
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImpersonationStartRequest'
            example:
              password: "password"
              otp_code: "123456"
      responses:
        '200':
          description: Impersonation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpersonationStartResponse'
              example:
                token: "1|impersonation_token_example"
                session:
                  id: 50
                  started_at: "2026-03-05T10:15:00Z"
                impersonated:
                  id: 100
                  type: CLIENT
                  status: ACTIVE
                  name: "Jane Client"
                  first_name: "Jane"
                  last_name: "Client"
                  email: "jane.client@example.com"
                  phone: "+1-555-0100"
                  client_location_id: 1
                  client_location:
                    id: 1
                    name: "Headquarters"
                    code: "HQ"
                  locations: []
                  timezone: null
                  locale: null
                  address_line1: null
                  address_line2: null
                  city: null
                  state: null
                  postal_code: null
                  country: null
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T10:00:00Z"
                  phone_changed_at: "2026-03-05T10:00:00Z"
                  password_changed_at: "2026-03-05T10:00:00Z"
                  created_at: "2026-03-05T10:00:00Z"
                  updated_at: "2026-03-05T10:00:00Z"

  /api/admin/impersonate/stop:
    post:
      summary: Stop impersonation
      description: Idempotency-Key is required.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Impersonation stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpersonationStopResponse'
              example:
                token: "1|admin_token_new_example"
                impersonator:
                  id: 1
                  type: ADMIN
                  status: ACTIVE
                  name: "Admin User"
                  first_name: null
                  last_name: null
                  email: "admin@example.com"
                  phone: null
                  client_location_id: null
                  client_location: null
                  locations: []
                  timezone: null
                  locale: null
                  address_line1: null
                  address_line2: null
                  city: null
                  state: null
                  postal_code: null
                  country: null
                  two_factor_enabled: false
                  two_factor_confirmed_at: null
                  email_changed_at: "2026-03-05T09:00:00Z"
                  phone_changed_at: null
                  password_changed_at: "2026-03-05T09:00:00Z"
                  created_at: "2026-03-05T09:00:00Z"
                  updated_at: "2026-03-05T09:00:00Z"

  /api/admin/audit:
    get:
      summary: List audit logs
      parameters:
        - in: query
          name: date_from
          schema:
            type: string
            format: date-time
        - in: query
          name: date_to
          schema:
            type: string
            format: date-time
        - in: query
          name: user_id
          schema:
            type: integer
        - in: query
          name: location_id
          schema:
            type: integer
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: entity_type
          schema:
            type: string
        - in: query
          name: entity_id
          schema:
            type: integer
        - in: query
          name: risk_level
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH]
        - in: query
          name: result
          schema:
            type: string
            enum: [SUCCESS, FAIL]
        - in: query
          name: search
          description: Free-text search across action/entity/user/email/ip/device
          schema:
            type: string
        - in: query
          name: query
          description: Alias for search
          schema:
            type: string
        - in: query
          name: per_page
          schema:
            type: integer
        - in: query
          name: sort_by
          schema:
            type: string
            enum: [created_at, action, risk_level, result]
        - in: query
          name: sort_dir
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Paginated audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
              example:
                data:
                  - id: 501
                    created_at: "2026-03-05T12:30:00Z"
                    actor_id: 1
                    impersonator_id: null
                    actor:
                      id: 1
                      type: ADMIN
                      status: ACTIVE
                      name: "Admin User"
                      email: "admin@example.com"
                      phone: null
                    impersonator: null
                    location_id: 2
                    location:
                      id: 2
                      name: "Marina West"
                      code: "MW"
                    action: "task.update"
                    entity_type: "App\\\\Models\\\\Task"
                    entity_id: 44
                    risk_level: "LOW"
                    result: "SUCCESS"
                    ip_address: "203.0.113.10"
                    ip_hash: "c4be5f6c69c4e3b1a8b2bb9df3a1e0c9f5dbf1c1c8a5a4f7f6e9d0b1c2a3e4f5"
                    user_agent: "Mozilla/5.0"
                    device_id: "ios-123"
                    request_id: "req-123"
                    idempotency_key: "idem-123"
                    metadata:
                      method: "PATCH"
                      path: "api/tasks/44"
                      route: null
                      impersonation_session_id: null
                    snapshot_before:
                      id: 44
                      title: "Inspect hull"
                      status: "New"
                    snapshot_after:
                      id: 44
                      title: "Inspect hull"
                      status: "Pending"
                    updated_at: "2026-03-05T12:30:01Z"
                links:
                  first: "http://localhost:8000/api/admin/audit?page=1"
                  last: "http://localhost:8000/api/admin/audit?page=1"
                  prev: null
                  next: null
                meta:
                  current_page: 1
                  from: 1
                  last_page: 1
                  path: "http://localhost:8000/api/admin/audit"
                  per_page: 50
                  to: 1
                  total: 1

  /api/admin/audit/{id}:
    get:
      summary: Get audit log detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Audit log detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogResponse'
              example:
                data:
                  id: 501
                  created_at: "2026-03-05T12:30:00Z"
                  actor_id: 1
                  impersonator_id: null
                  actor:
                    id: 1
                    type: ADMIN
                    status: ACTIVE
                    name: "Admin User"
                    email: "admin@example.com"
                    phone: null
                  impersonator: null
                  location_id: 2
                  location:
                    id: 2
                    name: "Marina West"
                    code: "MW"
                  action: "task.update"
                  entity_type: "App\\\\Models\\\\Task"
                  entity_id: 44
                  risk_level: "LOW"
                  result: "SUCCESS"
                  ip_address: "203.0.113.10"
                  ip_hash: "c4be5f6c69c4e3b1a8b2bb9df3a1e0c9f5dbf1c1c8a5a4f7f6e9d0b1c2a3e4f5"
                  user_agent: "Mozilla/5.0"
                  device_id: "ios-123"
                  request_id: "req-123"
                  idempotency_key: "idem-123"
                  metadata:
                    method: "PATCH"
                    path: "api/tasks/44"
                    route: null
                    impersonation_session_id: null
                  snapshot_before:
                    id: 44
                    title: "Inspect hull"
                    status: "New"
                  snapshot_after:
                    id: 44
                    title: "Inspect hull"
                    status: "Pending"
                  updated_at: "2026-03-05T12:30:01Z"

  /api/public/users/employees:
    get:
      summary: List employees for task assignment
      responses:
        '200':
          description: Employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskAssignee'
              example:
                - id: 1
                  name: "Admin User"
                  email: "admin@example.com"
                  role: "ADMIN"
                - id: 12
                  name: "Staff User"
                  email: "staff@example.com"
                  role: "EMPLOYEE"

  /api/boards:
    get:
      summary: Get task board
      parameters:
        - in: query
