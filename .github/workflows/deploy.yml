name: Deploy Pipeline

on:
  push:
    branches: [main]

jobs:
  staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          STAGING_DEPLOY_COMMAND: ${{ secrets.STAGING_DEPLOY_COMMAND }}
        run: |
          if [ -n "$STAGING_DEPLOY_COMMAND" ]; then
            eval "$STAGING_DEPLOY_COMMAND"
          else
            echo "No staging deploy command configured."
          fi

      - name: Smoke tests
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          if [ -z "$STAGING_BASE_URL" ]; then
            echo "No STAGING_BASE_URL configured. Skipping smoke tests."; exit 0;
          fi
          curl -fsSL "$STAGING_BASE_URL/up" || exit 1

      - name: Escrow regression suite (staging)
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          ESCROW_TEST_USER_EMAIL: ${{ secrets.ESCROW_TEST_USER_EMAIL }}
          ESCROW_TEST_USER_PASSWORD: ${{ secrets.ESCROW_TEST_USER_PASSWORD }}
        run: |
          if [ -z "$STAGING_BASE_URL" ]; then
            echo "No STAGING_BASE_URL configured. Skipping Newman."; exit 0;
          fi
          npm install -g newman
          newman run postman/escrow-regression.json \
            --env-var baseUrl="$STAGING_BASE_URL" \
            --env-var loginEmail="$ESCROW_TEST_USER_EMAIL" \
            --env-var loginPassword="$ESCROW_TEST_USER_PASSWORD" \
            --timeout-request 30000

  production:
    needs: staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Manual approval required via environment protection
        run: echo "Awaiting production approval."

      - name: Deploy to production
        env:
          PRODUCTION_DEPLOY_COMMAND: ${{ secrets.PRODUCTION_DEPLOY_COMMAND }}
        run: |
          if [ -n "$PRODUCTION_DEPLOY_COMMAND" ]; then
            eval "$PRODUCTION_DEPLOY_COMMAND"
          else
            echo "No production deploy command configured."
          fi

      - name: Production health check (read-only)
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
        run: |
          if [ -z "$PRODUCTION_BASE_URL" ]; then
            echo "No PRODUCTION_BASE_URL configured. Skipping health check."; exit 0;
          fi
          curl -fsSL "$PRODUCTION_BASE_URL/up" || exit 1
