name: CI Gate

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=database/database.sqlite" >> .env
          echo "SECURITY_LOGIN_STEP_UP_NEW_DEVICE=false" >> .env
          echo "SECURITY_LOGIN_STEP_UP_NEW_COUNTRY=false" >> .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force
          php artisan db:seed --class=CiUserSeeder

      - name: Install Node dependencies
        run: npm ci

      - name: PHPUnit
        run: vendor/bin/phpunit

      - name: PHPStan (Larastan)
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Composer Audit
        run: composer audit --no-interaction

      - name: NPM Audit
        run: npm audit --audit-level=high

      - name: OpenAPI validation + diff
        run: scripts/ci/check-openapi.sh

      - name: Route security policy
        run: php scripts/ci/check-route-security.php

      - name: Migration safety check
        run: scripts/ci/check-migrations.sh

      - name: Escrow regression suite (Newman)
        env:
          ESCROW_TEST_USER_EMAIL: ci@example.com
          ESCROW_TEST_USER_PASSWORD: Password123!
          ESCROW_SUITE_BASE_URL: http://127.0.0.1:8000
        run: scripts/ci/run-escrow-newman.sh
